<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dadbyte</title>
<meta name="description" content="Dadbyte makes Ovenwise — a sourdough scheduler for Android that plans your whole bake backward from the moment you want bread.">
<style>
  :root { --bg:#F5F0EB; --ink:#1C1917; --muted:#57534E; --amber:#B45309; --rule:#E7E0D8; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1C1917; --ink:#F5F0EB; --muted:#A8A29E; --amber:#FBBF24; --rule:#3C3835; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:18px/1.6 Georgia,'Times New Roman',serif;
         min-height:100svh; display:flex; align-items:center; justify-content:center; }
  main { max-width:520px; padding:40px 24px; text-align:center; }
  .mark { font-size:56px; margin-bottom:8px; }
  h1 { font-size:30px; margin:0 0 4px; letter-spacing:.3px; }
  .tag { color:var(--muted); font-size:15px; margin:0 0 34px;
         font-family:system-ui,-apple-system,'Segoe UI',sans-serif; }
  .app { border:1px solid var(--rule); border-radius:14px; padding:22px 24px; text-align:left; }
  .app h2 { margin:0 0 6px; font-size:22px; color:var(--amber); }
  .app p { margin:0 0 10px; font-size:16px; }
  .soon { display:inline-block; font-size:12.5px; font-weight:600; letter-spacing:.08em;
          text-transform:uppercase; color:var(--amber); border:1px solid var(--amber);
          border-radius:999px; padding:3px 12px;
          font-family:system-ui,-apple-system,'Segoe UI',sans-serif; }
  footer { margin-top:30px; color:var(--muted); font-size:14px;
           font-family:system-ui,-apple-system,'Segoe UI',sans-serif; }
  a { color:var(--amber); }
</style>
</head>
<body>
<main>
  <div class="mark">🦉</div>
  <h1>Dadbyte</h1>
  <p class="tag">Small, honest apps. Made by a dad.</p>
  <div class="app">
    <h2>Ovenwise</h2>
    <p>A sourdough scheduler for Android. Tell it when you want to bake — it plans every step
       and reminds you on time.</p>
    <span class="soon">Coming soon to Google Play</span>
  </div>
  <footer>
    <a href="/ovenwise/privacy.html">Ovenwise privacy policy</a> ·
    <a href="mailto:support@dadbyte.com">support@dadbyte.com</a>
    <br>© 2026 Dadbyte
  </footer>
</main>
</body>
</html>
